<!DOCTYPE html>
<html>
<head>
    <title>Simple Snake Game</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: #2c3e50; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            flex-direction: column; 
        }
        canvas { 
            border: 5px solid #ecf0f1; 
            background: #000; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
        }
        h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .instructions { margin-top: 15px; color: #bdc3c7; }
    </style>
</head>
<body>

    <h1>Score: <span id="score">0</span></h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p class="instructions">Use Arrow Keys to move • Press <strong>SPACE</strong> to Start</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // Game Settings
        let score = 0;
        let gridSize = 20;
        let gameStarted = false;
        let gameSpeed = 150; // Higher = Slower (in milliseconds)

        // Snake & Food setup
        let snake = [{x: 160, y: 160}, {x: 140, y: 160}, {x: 120, y: 160}];
        let dx = gridSize;
        let dy = 0;
        let food = {x: 300, y: 300};

        // --- CORE LOGIC ---

        function main() {
            if (!gameStarted) return; 

            if (didGameEnd()) {
                alert("Game Over! Final Score: " + score);
                location.reload(); // Restarts the page
                return;
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main(); // Repeat the loop
            }, gameSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#2ecc71" : "#27ae60";
                ctx.strokeStyle = "#000";
                ctx.fillRect(part.x, part.y, gridSize, gridSize);
                ctx.strokeRect(part.x, part.y, gridSize, gridSize);
            });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerHTML = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            // Hit self
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            // Hit walls
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x > canvas.width - gridSize;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y > canvas.height - gridSize;
            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }

        function createFood() {
            food.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            food.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
            
            // Make sure food doesn't spawn on snake body
            snake.forEach(function isFoodOnSnake(part) {
                if (part.x == food.x && part.y == food.y) createFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x, food.y, gridSize, gridSize);
        }

        // --- CONTROLS ---

        function handleInput(event) {
            const keyPressed = event.keyCode;
            const SPACE_KEY = 32;
            const LEFT_KEY = 37;
            const UP_KEY = 38;
            const RIGHT_KEY = 39;
            const DOWN_KEY = 40;

            // Start Game logic
            if (keyPressed === SPACE_KEY && !gameStarted) {
                gameStarted = true;
                main();
                return;
            }

            // Direction logic (prevents 180-degree turns)
            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if (keyPressed === LEFT_KEY && !goingRight) { dx = -gridSize; dy = 0; }
            if (keyPressed === UP_KEY && !goingDown) { dx = 0; dy = -gridSize; }
            if (keyPressed === RIGHT_KEY && !goingLeft) { dx = gridSize; dy = 0; }
            if (keyPressed === DOWN_KEY && !goingUp) { dx = 0; dy = gridSize; }
        }

        // --- INITIAL STATE ---

        function drawStartScreen() {
            clearCanvas();
            ctx.fillStyle = "white";
            ctx.font = "24px Arial";
            ctx.textAlign = "center";
            ctx.fillText("READY?", canvas.width / 2, canvas.height / 2 - 10);
            ctx.font = "16px Arial";
            ctx.fillText("Press SPACE to Start", canvas.width / 2, canvas.height / 2 + 30);
            
            // Draw a preview of the snake and food
            drawSnake();
            drawFood();
        }

        document.addEventListener("keydown", handleInput);
        createFood();
        drawStartScreen();

    </script>
</body>
</html>
