<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sterne-Sammler</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.28.0/dist/supabase.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans">

  <div class="max-w-7xl mx-auto space-y-6">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 bg-white p-6 rounded-3xl shadow-sm">
      <div>
        <h1 class="text-3xl font-bold flex items-center gap-3">🏫 Sterne-Sammler</h1>
        <p class="mt-2 text-slate-600">Sterne erfassen, speichern und die Übersicht präsentieren.</p>
        <div id="storageStatus" class="mt-3 inline-flex items-center gap-2 rounded-full bg-slate-100 px-3 py-1 text-xs text-slate-700">
          💾 Browser-Modus
        </div>
      </div>
      <div class="flex flex-wrap gap-2">
        <button id="viewInput" class="px-3 py-1 bg-blue-500 text-white rounded">Eingabe</button>
        <button id="viewParliament" class="px-3 py-1 bg-gray-200 rounded">Schulparlament</button>
        <button id="resetAll" class="px-3 py-1 bg-red-500 text-white rounded">Alles zurücksetzen</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid gap-4 md:grid-cols-4">
      <div class="bg-white rounded-3xl p-4 shadow-sm text-center">
        <div class="text-sm text-slate-500">Gesamtsterne</div>
        <div class="text-3xl font-bold mt-2" id="totalStars">0</div>
      </div>
      <div class="bg-white rounded-3xl p-4 shadow-sm text-center">
        <div class="text-sm text-slate-500">Ziel Ausflug</div>
        <div class="text-3xl font-bold mt-2" id="goalStars">300</div>
      </div>
      <div class="bg-white rounded-3xl p-4 shadow-sm text-center">
        <div class="text-sm text-slate-500">Fortschritt</div>
        <div class="text-3xl font-bold mt-2" id="progressPercent">0%</div>
        <div class="h-4 w-full bg-slate-200 rounded-full mt-2">
          <div id="progressBar" class="h-4 bg-green-500 rounded-full w-0"></div>
        </div>
      </div>
      <div class="bg-white rounded-3xl p-4 shadow-sm text-center">
        <div class="text-sm text-slate-500">Noch bis zum Ziel</div>
        <div class="text-3xl font-bold mt-2" id="starsRemaining">0</div>
      </div>
    </div>

    <!-- Input Form -->
    <div id="inputView" class="bg-white rounded-3xl p-6 shadow-sm space-y-4 mt-6">
      <div class="grid gap-4 md:grid-cols-2">
        <div>
          <label class="block text-sm mb-1">Datum</label>
          <input type="date" id="inputDate" class="border p-2 rounded w-full" />
        </div>
        <div>
          <label class="block text-sm mb-1">Lehrperson</label>
          <input type="text" id="inputTeacher" class="border p-2 rounded w-full" />
        </div>
      </div>
      <div class="grid gap-4 md:grid-cols-2">
        <div>
          <label class="block text-sm mb-1">Klasse / Gruppe</label>
          <input type="text" id="inputClass" class="border p-2 rounded w-full" />
        </div>
        <div>
          <label class="block text-sm mb-1">Sterne</label>
          <input type="number" id="inputStars" min="1" max="10" class="border p-2 rounded w-full" />
        </div>
      </div>
      <div>
        <label class="block text-sm mb-1">Name Jugendlicher</label>
        <input type="text" id="inputStudent" class="border p-2 rounded w-full" placeholder="z.B. Reda" />
      </div>
      <div>
        <label class="block text-sm mb-1">Bemerkung</label>
        <input type="text" id="inputRemark" class="border p-2 rounded w-full" placeholder="z.B. pünktlich, hilfsbereit" />
      </div>
      <button id="saveEntry" class="bg-blue-500 text-white px-4 py-2 rounded">Eintrag speichern</button>
    </div>

    <!-- Last Entries -->
    <div class="bg-white rounded-3xl p-4 shadow-sm mt-6">
      <h2 class="font-bold text-lg mb-2">Letzte Einträge</h2>
      <div class="overflow-x-auto">
        <table class="w-full border-collapse text-sm">
          <thead class="bg-slate-100">
            <tr>
              <th class="border p-2">Datum</th>
              <th class="border p-2">Lehrperson</th>
              <th class="border p-2">Klasse</th>
              <th class="border p-2">Jugendliche:r</th>
              <th class="border p-2">Sterne</th>
              <th class="border p-2">Bemerkung</th>
            </tr>
          </thead>
          <tbody id="entriesTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // --- INITIAL DATA ---
    const STORAGE_KEY = "sterne-sammler-app";
    const defaultGoal = 300;
    let entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let goal = defaultGoal;

    // --- DOM ELEMENTS ---
    const totalStarsEl = document.getElementById("totalStars");
    const goalStarsEl = document.getElementById("goalStars");
    const progressPercentEl = document.getElementById("progressPercent");
    const progressBarEl = document.getElementById("progressBar");
    const starsRemainingEl = document.getElementById("starsRemaining");
    const entriesTable = document.getElementById("entriesTable");

    const inputDate = document.getElementById("inputDate");
    const inputTeacher = document.getElementById("inputTeacher");
    const inputClass = document.getElementById("inputClass");
    const inputStars = document.getElementById("inputStars");
    const inputStudent = document.getElementById("inputStudent");
    const inputRemark = document.getElementById("inputRemark");
    const saveEntryBtn = document.getElementById("saveEntry");

    // --- INITIALIZE ---
    inputDate.value = new Date().toISOString().slice(0,10);
    inputStars.value = 1;

    function render() {
      // Table
      entriesTable.innerHTML = "";
      entries.slice().reverse().forEach(e => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td class="border p-2">${e.date}</td>
          <td class="border p-2">${e.teacher}</td>
          <td class="border p-2">${e.klasse}</td>
          <td class="border p-2">${e.student}</td>
          <td class="border p-2 font-semibold">${e.stars}</td>
          <td class="border p-2">${e.remark}</td>
        `;
        entriesTable.appendChild(row);
      });

      // Stats
      const totalStars = entries.reduce((sum,e)=>sum+Number(e.stars||0),0);
      const progress = Math.min(100, Math.round((totalStars/goal)*100));
      const remaining = Math.max(goal - totalStars, 0);

      totalStarsEl.textContent = totalStars;
      goalStarsEl.textContent = goal;
      progressPercentEl.textContent = progress + "%";
      progressBarEl.style.width = progress + "%";
      starsRemainingEl.textContent = remaining;

      // Save to localStorage
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    saveEntryBtn.addEventListener("click",()=>{
      const newEntry = {
        date: inputDate.value,
        teacher: inputTeacher.value,
        klasse: inputClass.value,
        student: inputStudent.value,
        stars: Number(inputStars.value),
        remark: inputRemark.value
      };
      if(!newEntry.student.trim()) return alert("Bitte Name eingeben");
      entries.push(newEntry);
      render();
      inputStudent.value = "";
      inputStars.value = 1;
      inputRemark.value = "";
    });

    document.getElementById("resetAll").addEventListener("click",()=>{
      if(confirm("Alle Einträge wirklich löschen?")) {
        entries = [];
        render();
      }
    });

    render();
  </script>
</body>
</html>
